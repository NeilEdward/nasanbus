spring:
  application:
    name: nasanbus-api

  datasource:
    url: jdbc:postgresql://localhost:5432/nasanbus
    username: nasanbus_user
    password: nasanbus_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: DEBUG